<div class="shop-banner">
  <div class="shop-banner-inner">
    <span class="shop-label">Our Collection</span>
    <h1 class="shop-title">Discover <span class="text-gradient">Your Style</span></h1>
    <p class="shop-subtitle">Browse our curated selection of premium clothing</p>
  </div>
  <div class="banner-blur-circle c1"></div>
  <div class="banner-blur-circle c2"></div>
</div>

<div class="filter-bar-wrap">
  <div class="filter-bar">

    <div class="fbar-item fbar-search">
      <i class="fas fa-search fbar-icon"></i>
      <input
        id="productSearch"
        type="text"
        class="fbar-input"
        [(ngModel)]="filters.name"
        (ngModelChange)="applyFilters()"
        placeholder="Search products..."
        title="Search products by name"
      />
    </div>

    <div class="fbar-item">
      <i class="fas fa-th-large fbar-icon"></i>
      <select
        id="categorySelect"
        class="fbar-select"
        [(ngModel)]="filters.category"
        (change)="applyFilters()"
        title="Filter by category"
      >
        <option value="">All Categories</option>
        <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.title }}</option>
      </select>
    </div>

    <div class="fbar-item" *ngIf="filteredSubCategories.length > 0">
      <i class="fas fa-layer-group fbar-icon"></i>
      <select
        id="subCategorySelect"
        class="fbar-select"
        [(ngModel)]="filters.subCategory"
        (change)="applyFilters()"
        title="Filter by sub-category"
      >
        <option value="">All Products</option>
        <option *ngFor="let sub of filteredSubCategories" [value]="sub._id">{{ sub.title }}</option>
      </select>
    </div>

    <div class="fbar-item fbar-price">
      <span class="fbar-price-label">Max: <strong>${{ filters.maxPrice }}</strong></span>
      <input
        type="range"
        class="fbar-range"
        min="1"
        [max]="maxPriceLimit"
        step="10"
        [(ngModel)]="filters.maxPrice"
        (change)="applyFilters()"
        title="Filter by max price"
      />
    </div>

    <div class="fbar-item fbar-sort">
      <i class="fas fa-sort-amount-down fbar-icon"></i>
      <select
        id="sortSelect"
        class="fbar-select"
        [(ngModel)]="filters.sort"
        (change)="applyFilters()"
        title="Sort products"
      >
        <option value="-createdAt">Newest</option>
        <option value="price">Price: Low to High</option>
        <option value="-price">Price: High to Low</option>
      </select>
    </div>

  </div>

</div>

<div class="shop-content">
  <div class="products-grid" *ngIf="products.length > 0">
    <div class="product-cell" *ngFor="let prod of products">
      <app-product-card
        [product]="prod"
        layout="grid"
        (addToCart)="addToCart($event)"
      ></app-product-card>
    </div>
  </div>

  <div class="empty-state" *ngIf="products.length === 0">
    <div class="empty-icon">
      <i class="fas fa-box-open"></i>
    </div>
    <h3>No products found</h3>
    <p>Try adjusting your filters or search term</p>
    <button class="clear-btn" (click)="resetFilters()">
      <i class="fas fa-redo-alt me-2"></i>Clear Filters
    </button>
  </div>
</div>
