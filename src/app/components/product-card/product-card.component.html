<div
  *ngIf="layout === 'grid'"
  class="card product-card h-100 border-0 shadow-sm rounded-4 overflow-hidden transition-all hover-lift"
  (click)="openModal()"
  style="cursor: pointer;"
>
  <div class="position-relative overflow-hidden">
    <img
      [src]="product.img"
      class="card-img-top img-grid-large"
      [alt]="product.title || 'Product image'"
      title="Product image"
    />
    
    
        <!-- Simplified status labels below image -->
        <!-- Status badges placed below product details -->
        <div class="card-status d-flex gap-2 mt-2">
          <span *ngIf="product.isNewArrival && product.stock > 3" class="badge bg-success text-white">NEW</span>
          <span *ngIf="product.stock > 0 && product.stock <= 3" class="badge bg-danger text-white">Only {{ product.stock }} left!</span>
          <span *ngIf="product.stock === 0" class="badge bg-dark text-white">Out of Stock</span>
        </div>


  </div>
  <div class="card-body p-4">
    <div class="d-flex justify-content-between mb-2">
      <span class="text-gray small">{{ product.category?.title || 'Uncategorized' }}</span>
      <span class="text-primary small fw-bold text-uppercase">{{ product.gender }}</span>
    </div>
    <h6 class="fw-bold mb-3 fs-5 text-truncate-2">{{ product.title }}</h6>
    <div class="d-flex justify-content-between align-items-center">
      <span class="fw-bolder text-primary fs-4">${{ product.price }}</span>
      <button
        class="btn btn-primary rounded-pill px-4"
        (click)="onAddToCartWithStop($event)"
        [disabled]="product.stock === 0"
      >
        <i class="fas fa-shopping-cart me-2"></i>Add
      </button>
    </div>
  </div>
</div>


<div
  *ngIf="layout === 'compact'"
  class="card product-card h-100 border-0 shadow-sm rounded-4 overflow-hidden transition-all hover-lift"
  (click)="openModal()"
  style="cursor: pointer;"
>
  <div class="position-relative overflow-hidden">
    <img
      [src]="product.img"
      class="card-img-top img-compact-small"
      [alt]="product.title || 'Product image'"
      title="Product image"
    />
    
        <!-- Simplified status labels below image -->
        <div class="status-labels d-flex gap-2 mt-2">
          <span *ngIf="product.isNewArrival && product.stock > 3" class="badge bg-success text-white">NEW</span>
          <span *ngIf="product.stock > 0 && product.stock <= 3" class="badge bg-danger text-white">Only {{ product.stock }} left!</span>
          <span *ngIf="product.stock === 0" class="badge bg-dark text-white">Out of Stock</span>
        </div>

  </div>
  <div class="card-body p-3">
    <h6 class="fw-bold mb-1 text-truncate">{{ product.title }}</h6>
    <p class="text-gray small mb-2">{{ product.category?.title || 'Uncategorized' }}</p>
    <div class="d-flex justify-content-between align-items-center">
      <span class="fw-bolder text-primary">${{ product.price }}</span>
      <button
        class="btn btn-sm btn-primary rounded-circle shadow-sm"
        (click)="onAddToCartWithStop($event)"
        [disabled]="product.stock === 0"
        title="Add to cart"
      >
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </div>
</div>
