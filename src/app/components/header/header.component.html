<nav class="navbar navbar-expand-lg glass-morphism sticky-top py-3">
  <div class="container">
    
    <button class="sidebar-toggle-btn me-3" style="margin-right: 10px;" (click)="toggleSidebar()" aria-label="Open categories">
  <span class="hamburger-line single"></span>
  <span class="hamburger-line single"></span>
  <span class="hamburger-line single"></span>
</button>
<a class="navbar-brand fw-bolder fs-3 text-primary" style="color: rgba(37, 34, 34, 0.915) !important;  " routerLink="/">{{ settings?.siteName || 'YOUTH STORE' }}</a>
<!-- Direct navigation links always visible -->
<ul class="navbar-nav mx-auto">
      <li class="nav-item">
        <a class="nav-link fw-semibold px-3" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link fw-semibold px-3" routerLink="/shop" routerLinkActive="active">Shop</a>
      </li>
      <li class="nav-item">
        <a class="nav-link fw-semibold px-3" routerLink="/testimonials" routerLinkActive="active">Testimonials</a>
      </li>

      <li class="nav-item">
        <a class="nav-link fw-semibold px-3" routerLink="/contact" routerLinkActive="active">Contact Us</a>
      </li>
      <li class="nav-item" *ngIf="authService.isAdmin()">
        <a class="nav-link fw-semibold px-3 text-danger" routerLink="/admin" routerLinkActive="active">Admin</a>
      </li>
      
    </ul>

    <div class="d-flex align-items-center gap-3">
    

      <a routerLink="/cart" class="position-relative text-dark cart-icon">
        <i class="fas fa-shopping-bag fs-4"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary" *ngIf="(cartService.cartCount$ | async) as cartCount">
          {{ cartCount }}
        </span>
      </a>

      <ng-container *ngIf="!(authService.user$ | async); else userMenu">
        <a routerLink="/login" class="btn btn-outline-primary rounded-pill px-4 login-btn">Login</a>
      </ng-container>

      <ng-template #userMenu>
        <div class="dropdown">
          <button class="btn btn-primary rounded-pill px-4 dropdown-toggle" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-user-circle me-2"></i>Profile
          </button>
          <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 p-2 mt-3" aria-labelledby="profileDropdown">
            <li><a class="dropdown-item rounded-3 py-2" routerLink="/profile">Edit Your Profile</a></li>
            <li *ngIf="!authService.isAdmin()"><a class="dropdown-item rounded-3 py-2" routerLink="/profile">My Orders</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button class="dropdown-item rounded-3 py-2 text-danger" (click)="authService.logout()">Logout</button></li>
          </ul>
        </div>
      </ng-template>
    </div>
  </div>
</nav>


<div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>


<aside class="categories-sidebar" [class.open]="sidebarOpen" id="categoriesSidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <i class="fas fa-th-large me-2"></i>
      <span>Categories</span>
    </div>
    <button class="sidebar-close-btn" (click)="closeSidebar()" aria-label="Close sidebar">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="sidebar-body">
    
    <a class="sidebar-all-link" routerLink="/shop" (click)="closeSidebar()">
      <i class="fas fa-store me-3"></i>
      <span>All Products</span>
      <i class="fas fa-arrow-right ms-auto"></i>
    </a>

    <div class="sidebar-divider"></div>

    
    <div class="category-list">
      <div class="category-item" *ngFor="let cat of categories">
        
        <a class="category-main-link"
           [routerLink]="['/shop']" 
           [queryParams]="{category: cat._id}"
           (click)="closeSidebar()">
          <div class="category-icon-wrap">
            <i class="fas fa-tag"></i>
          </div>
          <span class="category-title">{{ cat.title }}</span>
          <button class="sub-toggle-btn" 
                  *ngIf="getSubsForCat(cat._id).length"
                  (click)="toggleCategory($event, cat._id)"
                  [attr.aria-expanded]="expandedCat === cat._id">
            <i class="fas fa-chevron-down" [class.rotated]="expandedCat === cat._id"></i>
          </button>
        </a>

        
        <div class="sub-category-list" [class.expanded]="expandedCat === cat._id" *ngIf="getSubsForCat(cat._id).length">
          <a class="sub-category-link"
             *ngFor="let sub of getSubsForCat(cat._id)"
             [routerLink]="['/shop']"
             [queryParams]="{category: cat._id, subCategory: sub._id}"
             (click)="closeSidebar()">
            <span class="sub-dot"></span>
            {{ sub.title }}
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <p class="text-muted small mb-0">{{ categories.length }} categories available</p>
  </div>
</aside>
